<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cost Tracker — returning to app…</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 32rem;
           margin: 4rem auto; padding: 0 1rem; line-height: 1.6; color: #1a1a1a;
           text-align: center; }
    a.btn { display: inline-block; margin-top: 1rem; padding: 0.7rem 1.4rem;
            background: #1a56db; color: #fff; border-radius: 8px; text-decoration: none; }
  </style>
  <script>
    // Forward the OAuth result (?code=… &state=…) to the native app's custom scheme.
    (function () {
      var target = "costtracker://eb-callback" + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Returning to Cost Tracker…</p>
  <p>If the app doesn't open automatically:</p>
  <a class="btn" id="manual" href="costtracker://eb-callback">Open Cost Tracker</a>
  <script>
    // Preserve the query/hash on the manual fallback link too.
    document.getElementById("manual").href =
      "costtracker://eb-callback" + window.location.search + window.location.hash;
  </script>
</body>
</html>
